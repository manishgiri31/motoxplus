name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit SHA to roll back to"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate_inputs:
    name: Validate Inputs & Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      start_time: ${{ steps.start.outputs.start_time }}
    steps:
      - name: Record start time
        id: start
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Check commit input and required secrets
        run: |
          if [ -z "$TARGET_COMMIT" ]; then
            echo "::error::commit input is required"
            exit 1
          fi
          if ! [[ "$TARGET_COMMIT" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            echo "::error::commit input '${TARGET_COMMIT}' does not look like a valid git SHA (7-40 hex characters)"
            exit 1
          fi
          missing=0
          for v in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          exit $missing
        env:
          # Routed through env (not interpolated directly into the script text)
          # so a crafted commit input can't break out of the shell command.
          TARGET_COMMIT: ${{ inputs.commit }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}

  rollback:
    name: Roll Back to ${{ inputs.commit }}
    needs: validate_inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Roll back via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 20m
          command_timeout: 20m
          script_stop: true
          envs: TARGET_COMMIT
          script: |
            set -euo pipefail
            APP_DIR="/var/www/motoxplus"
            cd "$APP_DIR"

            echo "====================================="
            echo " MotoXPlus Manual Rollback"
            echo " Target commit: ${TARGET_COMMIT}"
            echo "====================================="

            echo ""
            echo "===== Fetching ====="
            git fetch origin

            echo ""
            echo "===== Verifying commit exists ====="
            if ! git rev-parse --verify "${TARGET_COMMIT}^{commit}" > /dev/null 2>&1; then
              echo "::error::Commit ${TARGET_COMMIT} does not exist in this repository — aborting before touching the running app"
              exit 1
            fi
            echo "Confirmed: ${TARGET_COMMIT} exists."

            echo ""
            echo "===== Checking out ${TARGET_COMMIT} ====="
            git checkout -f "$TARGET_COMMIT"

            echo ""
            echo "===== Install Dependencies ====="
            npm ci --ignore-scripts

            echo ""
            echo "===== Generate Prisma Client ====="
            npx prisma generate

            echo ""
            echo "===== Build ====="
            npm run build

            echo ""
            echo "===== Reload PM2 ====="
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js --env production

            echo ""
            echo "===== Waiting for Application Health ====="
            for i in $(seq 1 15); do
              if curl -sf --max-time 5 http://localhost:3000/api/health > /dev/null; then
                echo "Healthy after ${i} attempt(s)."
                echo "$TARGET_COMMIT" > "$APP_DIR/.deploy_prev_sha"
                echo ""
                echo "===== Rollback to ${TARGET_COMMIT} successful ====="
                exit 0
              fi
              echo "Attempt ${i}/15 — not ready yet, retrying in 4s..."
              sleep 4
            done

            echo "::error::Application did not become healthy after rollback to ${TARGET_COMMIT}"
            exit 1
        env:
          TARGET_COMMIT: ${{ inputs.commit }}

  notify:
    name: Notify
    if: always()
    needs: [validate_inputs, rollback]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Compute duration
        id: duration
        run: |
          START="${{ needs.validate_inputs.outputs.start_time }}"
          END=$(date +%s)
          if [ -n "$START" ]; then
            ELAPSED=$((END - START))
            echo "human=$(printf '%dm%ds' $((ELAPSED / 60)) $((ELAPSED % 60)))" >> "$GITHUB_OUTPUT"
          else
            echo "human=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Report success
        if: needs.rollback.result == 'success'
        run: |
          echo "===== Rollback Succeeded ====="
          echo "Workflow:       ${{ github.workflow }}"
          echo "Rolled back to: ${TARGET_COMMIT}"
          echo "Branch:         ${{ github.ref_name }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Duration:       ${{ steps.duration.outputs.human }}"
        env:
          TARGET_COMMIT: ${{ inputs.commit }}

      - name: Report failure
        if: needs.rollback.result == 'failure'
        run: |
          echo "::error::Rollback to ${TARGET_COMMIT} failed."
          echo "Workflow: ${{ github.workflow }}"
          echo "Actor:    ${{ github.actor }}"
          echo "Duration: ${{ steps.duration.outputs.human }}"
          echo "Run:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Check on the VPS: pm2 logs motoxplus / pm2 describe motoxplus"
        env:
          TARGET_COMMIT: ${{ inputs.commit }}

      - name: Optional Slack notification on failure
        if: needs.rollback.result == 'failure'
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"MotoXPlus rollback to ${TARGET_COMMIT} FAILED (by ${{ github.actor }}). Run: ${RUN_URL}\"}" \
              "$SLACK_WEBHOOK_URL" || echo "Slack notification failed to send."
          else
            echo "SLACK_WEBHOOK_URL not configured — skipping notification."
          fi
        env:
          TARGET_COMMIT: ${{ inputs.commit }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
