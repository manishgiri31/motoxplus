name: Import Products

# NOTE: This workflow previously ran automatically on every push that touched
# imports/**, calling `npm run import <type>`. That npm script does not exist
# yet, so the automatic trigger has been disabled — a workflow that fails on
# every relevant push is worse than no workflow at all, and would have
# blocked deploy.yml/backup.yml/etc. from running too (they share this same
# concurrency group). This is now workflow_dispatch-only, and the job itself
# checks for the importer script before attempting to use it: if it's still
# missing, the run exits 0 with a clear message instead of failing.
#
# TODO: implement `npm run import <type>` (e.g. a script at prisma/import.ts
# that reads imports/<type>.xlsx and upserts the corresponding products,
# following the pattern already used by prisma/seed-cables.ts). Once that
# script exists, this workflow will actually perform the import; nothing else
# needs to change here.

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Import type to run (matches a file under imports/, e.g. 'cables' for imports/cables.xlsx)"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate_secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      start_time: ${{ steps.start.outputs.start_time }}
    steps:
      - name: Record start time
        id: start
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Check required secrets are configured
        run: |
          missing=0
          for v in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          exit $missing
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}

  import:
    name: Import ${{ inputs.type }}
    needs: validate_secrets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Run import via SSH (no-ops gracefully if the importer isn't implemented yet)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30m
          command_timeout: 30m
          script_stop: true
          envs: IMPORT_TYPE
          script: |
            set -euo pipefail
            APP_DIR="/var/www/motoxplus"
            cd "$APP_DIR"

            echo "====================================="
            echo " MotoXPlus Product Import"
            echo " Type: ${IMPORT_TYPE}"
            echo "====================================="

            echo ""
            echo "===== Pulling latest imports/ ====="
            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo ""
            echo "===== Checking importer availability ====="
            if ! node -e "process.exit(require('./package.json').scripts.import ? 0 : 1)" 2>/dev/null; then
              echo "::warning::TODO: 'npm run import' does not exist yet in package.json."
              echo "::warning::This workflow is a no-op until the importer script is implemented."
              echo "::warning::See the comment at the top of import-products.yml for what's needed."
              echo ""
              echo "===== Skipped (importer not implemented) ====="
              exit 0
            fi

            if [ ! -f "imports/${IMPORT_TYPE}.xlsx" ] && [ ! -f "imports/${IMPORT_TYPE}.csv" ]; then
              echo "::warning::No file found at imports/${IMPORT_TYPE}.xlsx or .csv — nothing to import for type '${IMPORT_TYPE}'."
              exit 0
            fi

            echo ""
            echo "===== Importing: ${IMPORT_TYPE} ====="
            npm run import "$IMPORT_TYPE"
            echo "===== Completed: ${IMPORT_TYPE} ====="
        env:
          IMPORT_TYPE: ${{ inputs.type }}

  notify:
    name: Notify
    if: always()
    needs: [validate_secrets, import]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Compute duration
        id: duration
        run: |
          START="${{ needs.validate_secrets.outputs.start_time }}"
          END=$(date +%s)
          if [ -n "$START" ]; then
            ELAPSED=$((END - START))
            echo "human=$(printf '%dm%ds' $((ELAPSED / 60)) $((ELAPSED % 60)))" >> "$GITHUB_OUTPUT"
          else
            echo "human=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Report success
        if: needs.import.result == 'success'
        run: |
          echo "===== Import Step Finished ====="
          echo "Workflow: ${{ github.workflow }}"
          echo "Type:     ${IMPORT_TYPE}"
          echo "Actor:    ${{ github.actor }}"
          echo "Duration: ${{ steps.duration.outputs.human }}"
          echo "(Check the SSH step log above — this reports 'success' even when the importer no-ops because it isn't implemented yet.)"
        env:
          IMPORT_TYPE: ${{ inputs.type }}

      - name: Report failure
        if: needs.import.result == 'failure'
        run: |
          echo "::error::Product import '${IMPORT_TYPE}' failed."
          echo "Duration: ${{ steps.duration.outputs.human }}"
          echo "Run:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "See the SSH step log above."
        env:
          IMPORT_TYPE: ${{ inputs.type }}

      - name: Optional Slack notification on failure
        if: needs.import.result == 'failure'
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"MotoXPlus import '${IMPORT_TYPE}' FAILED (by ${{ github.actor }}). Run: ${RUN_URL}\"}" \
              "$SLACK_WEBHOOK_URL" || echo "Slack notification failed to send."
          else
            echo "SLACK_WEBHOOK_URL not configured — skipping notification."
          fi
        env:
          IMPORT_TYPE: ${{ inputs.type }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
