name: Import Products

on:
  push:
    branches:
      - main
    paths:
      - "imports/**"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  detect:
    name: Detect Changed Import Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      types: ${{ steps.detect.outputs.types }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect changed files under imports/
        id: detect
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- 'imports/*' || true)
          if [ -z "$FILES" ]; then
            echo "No import files changed in this push."
            echo "types=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed import files:"
          echo "$FILES"

          TYPES=""
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            BASENAME=$(basename "$FILE")
            TYPE="${BASENAME%.*}"
            TYPES="${TYPES}${TYPE} "
          done <<< "$FILES"

          echo "Detected import types: ${TYPES}"
          echo "types=${TYPES}" >> "$GITHUB_OUTPUT"

  validate_secrets:
    name: Validate Secrets
    needs: detect
    if: needs.detect.outputs.types != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required secrets are configured
        run: |
          missing=0
          for v in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          exit $missing
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}

  import:
    name: Import Detected Types
    needs: [detect, validate_secrets]
    if: needs.detect.outputs.types != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Run import(s) via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30m
          command_timeout: 30m
          script_stop: true
          envs: IMPORT_TYPES
          script: |
            set -euo pipefail
            APP_DIR="/var/www/motoxplus"
            cd "$APP_DIR"

            echo "====================================="
            echo " MotoXPlus Product Import"
            echo " Types: ${IMPORT_TYPES}"
            echo "====================================="

            echo ""
            echo "===== Pulling latest imports/ ====="
            git fetch origin
            git checkout main
            git reset --hard origin/main

            for TYPE in $IMPORT_TYPES; do
              echo ""
              echo "===== Importing: ${TYPE} ====="
              npm run import "$TYPE"
              echo "===== Completed: ${TYPE} ====="
            done

            echo ""
            echo "===== All imports finished ====="
        env:
          IMPORT_TYPES: ${{ needs.detect.outputs.types }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Product import failed. Check the SSH step log above for which type failed."
