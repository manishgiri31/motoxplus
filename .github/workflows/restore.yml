name: Restore Database from Backup

on:
  workflow_dispatch:
    inputs:
      backup_filename:
        description: "Exact backup filename in R2 (e.g. motoxplus-db-2026-07-13T01-00-00Z.dump)"
        required: true
        type: string
      confirm:
        description: 'Type RESTORE to confirm you want to overwrite the live database'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate_inputs:
    name: Validate Inputs & Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      start_time: ${{ steps.start.outputs.start_time }}
    steps:
      - name: Record start time
        id: start
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Check confirmation, filename format, and required secrets
        run: |
          if [ "$CONFIRM_INPUT" != "RESTORE" ]; then
            echo "::error::Confirmation input must be exactly 'RESTORE'. Refusing to touch the production database."
            exit 1
          fi

          # Strict allow-list matching this project's backup.yml naming
          # convention. Rejects anything else outright — this filename is
          # interpolated into shell commands and an S3 key on the VPS, so it
          # must never contain shell metacharacters, path separators, or
          # path-traversal sequences.
          if ! [[ "$BACKUP_FILENAME" =~ ^motoxplus-db-[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}Z\.dump$ ]]; then
            echo "::error::backup_filename '${BACKUP_FILENAME}' does not match the expected pattern motoxplus-db-<timestamp>.dump"
            exit 1
          fi

          missing=0
          for v in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          exit $missing
        env:
          # Routed through env (not interpolated directly into the script
          # text) so a crafted input value can't break out of the shell command.
          CONFIRM_INPUT: ${{ inputs.confirm }}
          BACKUP_FILENAME: ${{ inputs.backup_filename }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}

  restore:
    name: Restore ${{ inputs.backup_filename }}
    needs: validate_inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Download, verify, restore, validate
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 25m
          command_timeout: 25m
          script_stop: true
          envs: BACKUP_FILENAME
          script: |
            set -euo pipefail

            APP_DIR="/var/www/motoxplus"
            RESTORE_DIR="/var/backups/motoxplus/restore-tmp"
            LOCAL_PATH="${RESTORE_DIR}/${BACKUP_FILENAME}"

            echo "====================================="
            echo " MotoXPlus Database Restore"
            echo " Backup: ${BACKUP_FILENAME}"
            echo "====================================="

            mkdir -p "$RESTORE_DIR"
            cd "$APP_DIR"
            set -a
            source .env
            set +a

            command -v pg_restore >/dev/null 2>&1 || {
              echo "===== Installing postgresql-client ====="
              sudo apt-get update -y -qq
              sudo apt-get install -y -qq postgresql-client
            }
            command -v aws >/dev/null 2>&1 || {
              echo "===== Installing awscli ====="
              sudo apt-get update -y -qq
              sudo apt-get install -y -qq awscli
            }

            export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
            export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
            R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

            echo ""
            echo "===== Downloading backup from R2 ====="
            aws s3 cp "s3://${R2_BUCKET_NAME}/db-backups/${BACKUP_FILENAME}" "$LOCAL_PATH" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors
            aws s3 cp "s3://${R2_BUCKET_NAME}/db-backups/${BACKUP_FILENAME}.sha256" "${LOCAL_PATH}.sha256" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors

            echo ""
            echo "===== Verifying checksum ====="
            EXPECTED_SHA256=$(cat "${LOCAL_PATH}.sha256")
            ACTUAL_SHA256=$(sha256sum "$LOCAL_PATH" | awk '{print $1}')
            if [ "$EXPECTED_SHA256" != "$ACTUAL_SHA256" ]; then
              echo "::error::Checksum mismatch — refusing to restore a possibly-corrupted backup"
              echo "::error::expected=${EXPECTED_SHA256} actual=${ACTUAL_SHA256}"
              rm -rf "$RESTORE_DIR"
              exit 1
            fi
            echo "Checksum verified: ${ACTUAL_SHA256}"

            echo ""
            echo "===== Verifying archive integrity (pg_restore --list) ====="
            if ! pg_restore --list "$LOCAL_PATH" > /dev/null; then
              echo "::error::Archive failed integrity check — refusing to restore"
              rm -rf "$RESTORE_DIR"
              exit 1
            fi
            echo "Archive integrity OK."

            echo ""
            echo "===== Restoring into PostgreSQL ====="
            echo "This will drop and recreate objects present in the backup (--clean --if-exists)."
            pg_restore --no-owner --no-privileges --clean --if-exists \
              --dbname="$DATABASE_URL" "$LOCAL_PATH"
            echo "Restore command completed."

            echo ""
            echo "===== Prisma validation ====="
            npx prisma validate
            npx prisma migrate status || {
              echo "::warning::'prisma migrate status' reported drift — review manually. The restore itself already completed."
            }

            echo ""
            echo "===== Cleaning up local temp files ====="
            rm -rf "$RESTORE_DIR"

            echo ""
            echo "===== Restore successful: ${BACKUP_FILENAME} ====="
        env:
          BACKUP_FILENAME: ${{ inputs.backup_filename }}

  notify:
    name: Notify
    if: always()
    needs: [validate_inputs, restore]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Compute duration
        id: duration
        run: |
          START="${{ needs.validate_inputs.outputs.start_time }}"
          END=$(date +%s)
          if [ -n "$START" ]; then
            ELAPSED=$((END - START))
            echo "human=$(printf '%dm%ds' $((ELAPSED / 60)) $((ELAPSED % 60)))" >> "$GITHUB_OUTPUT"
          else
            echo "human=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Report success
        if: needs.restore.result == 'success'
        run: |
          echo "===== Restore Succeeded ====="
          echo "Workflow: ${{ github.workflow }}"
          echo "Backup:   ${BACKUP_FILENAME}"
          echo "Actor:    ${{ github.actor }}"
          echo "Duration: ${{ steps.duration.outputs.human }}"
        env:
          BACKUP_FILENAME: ${{ inputs.backup_filename }}

      - name: Report failure
        if: needs.restore.result == 'failure'
        run: |
          echo "::error::Restore of '${BACKUP_FILENAME}' failed."
          echo "Duration: ${{ steps.duration.outputs.human }}"
          echo "Run:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "See the SSH step log above for whether it failed at checksum verification, integrity check, or the pg_restore step itself."
        env:
          BACKUP_FILENAME: ${{ inputs.backup_filename }}

      - name: Optional Slack notification on failure
        if: needs.restore.result == 'failure'
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"MotoXPlus restore of ${BACKUP_FILENAME} FAILED (by ${{ github.actor }}). Run: ${RUN_URL}\"}" \
              "$SLACK_WEBHOOK_URL" || echo "Slack notification failed to send."
          else
            echo "SLACK_WEBHOOK_URL not configured — skipping notification."
          fi
        env:
          BACKUP_FILENAME: ${{ inputs.backup_filename }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
