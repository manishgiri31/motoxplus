name: Database Seed

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which seed to run"
        required: true
        type: choice
        options:
          - cables
          - mudguards
          - all

concurrency:
  group: production-seed
  cancel-in-progress: false

jobs:
  validate_secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required secrets are configured
        run: |
          missing=0
          for v in VPS_HOST VPS_USER VPS_SSH_KEY VPS_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          exit $missing
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}

  seed:
    name: Run Seed (${{ inputs.target }})
    needs: validate_secrets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Run seed via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 40m
          command_timeout: 40m
          script_stop: true
          envs: SEED_TARGET
          script: |
            set -euo pipefail
            APP_DIR="/var/www/motoxplus"
            cd "$APP_DIR"

            echo "====================================="
            echo " MotoXPlus Database Seed"
            echo " Target: ${SEED_TARGET}"
            echo "====================================="

            run_seed() {
              echo ""
              echo "===== Running: $1 ====="
              npm run "$1"
              echo "===== Completed: $1 ====="
            }

            case "$SEED_TARGET" in
              cables)
                run_seed db:seed-cables
                ;;
              mudguards)
                run_seed db:seed-mudguard
                ;;
              all)
                run_seed db:seed
                run_seed db:seed-cables
                run_seed db:seed-mudguard
                run_seed db:seed-vehicles
                run_seed db:seed-descriptions
                ;;
              *)
                echo "::error::Unknown target: ${SEED_TARGET}"
                exit 1
                ;;
            esac

            echo ""
            echo "===== Seed run finished: ${SEED_TARGET} ====="
        env:
          SEED_TARGET: ${{ inputs.target }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Seed run '${{ inputs.target }}' failed. Check the SSH step log above for which seed script failed."
