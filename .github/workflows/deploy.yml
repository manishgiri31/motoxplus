name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Print connection info
        run: |
          echo "HOST=${{ secrets.VPS_HOST }}"
          echo "PORT=${{ secrets.VPS_PORT }}"
          echo "USER=${{ secrets.VPS_USER }}"

      - name: Test TCP connection
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd
          nc -vz ${{ secrets.VPS_HOST }} ${{ secrets.VPS_PORT }}

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          debug: true
          script: |
            echo "===== SSH SUCCESS ====="
            hostname
            whoami
            pwd

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 15m
          script: |
            set -e

            APP_DIR="/var/www/motoxplus"

            echo "===== Enter Project ====="
            cd "$APP_DIR"

            echo "===== Pull Latest Code ====="
            git fetch origin
            git reset --hard origin/main

            echo "===== Install Dependencies ====="
            npm ci --ignore-scripts

            echo "===== Generate Prisma Client ====="
            npx prisma generate

            echo "===== Skip Prisma Migrations (Temporary) ====="
            # npx prisma migrate deploy

            echo "===== Build Next.js ====="
            npm run build

            echo "===== Restart PM2 ====="
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js

            echo "===== PM2 Status ====="
            pm2 list

            echo "===== Health Check ====="
            curl -I http://localhost:3000 || true

            echo "===== Deployment Successful ====="

      - name: Notify Failure
        if: failure()
        run: |
          echo "::error::Deployment failed!"
          echo "Check:"
          echo "  pm2 logs motoxplus"
          echo "  journalctl -u nginx"
          echo "  journalctl -u postgresql"
