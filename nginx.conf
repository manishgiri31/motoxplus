# =============================================================================
# MOTOXPLUS — NGINX PRODUCTION CONFIG
# Ubuntu 24.04 + Let's Encrypt + Cloudflare
# =============================================================================
#
# INSTALL:
#   sudo cp nginx.conf /etc/nginx/sites-available/motoxplus.com
#   sudo ln -sf /etc/nginx/sites-available/motoxplus.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
#
# REQUIREMENTS:
#   sudo apt install nginx libnginx-mod-brotli
#   sudo certbot --nginx -d motoxplus.com -d www.motoxplus.com
# =============================================================================

# Rate limiting zones (defined in http context — include in /etc/nginx/nginx.conf or here)
limit_req_zone $binary_remote_addr zone=global:20m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload:5m  rate=5r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# =============================================================================
# Redirect HTTP → HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name motoxplus.com www.motoxplus.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://motoxplus.com$request_uri;
    }
}

# =============================================================================
# Redirect www → non-www (HTTPS)
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.motoxplus.com;

    ssl_certificate     /etc/letsencrypt/live/motoxplus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/motoxplus.com/privkey.pem;

    return 301 https://motoxplus.com$request_uri;
}

# =============================================================================
# Main HTTPS server
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name motoxplus.com;

    # -------------------------------------------------------------------------
    # TLS Configuration
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/motoxplus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/motoxplus.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/motoxplus.com/chain.pem;

    # Modern TLS — TLSv1.2 minimum, prefer TLSv1.3
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # Compression — gzip + brotli
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Brotli (requires libnginx-mod-brotli)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # Timeouts & Buffers
    # -------------------------------------------------------------------------
    client_max_body_size 20M;           # max upload size (product images, etc.)
    client_body_buffer_size 128k;
    client_body_timeout 60s;
    client_header_timeout 30s;
    keepalive_timeout 75s;
    send_timeout 30s;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # -------------------------------------------------------------------------
    # Connection limits
    # -------------------------------------------------------------------------
    limit_conn conn_limit 20;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/motoxplus-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/motoxplus-error.log warn;

    # -------------------------------------------------------------------------
    # Static assets — serve directly from .next/static with aggressive caching
    # -------------------------------------------------------------------------
    location /_next/static/ {
        alias /var/www/motoxplus/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # Public files (logo, favicon, etc.)
    location /public/ {
        alias /var/www/motoxplus/public/;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Favicon — short cache
    location = /favicon.ico {
        alias /var/www/motoxplus/public/favicon.ico;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Robots & sitemap — no Nginx auth check
    location ~ ^/(robots\.txt|sitemap\.xml)$ {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        add_header Cache-Control "public, max-age=3600";
    }

    # -------------------------------------------------------------------------
    # Auth endpoints — strict rate limiting
    # -------------------------------------------------------------------------
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # -------------------------------------------------------------------------
    # Upload endpoints — strict rate limiting + larger body
    # -------------------------------------------------------------------------
    location ~ ^/api/upload/ {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 20M;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
    }

    # -------------------------------------------------------------------------
    # API routes — moderate rate limiting
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        add_header Cache-Control "no-store";
    }

    # -------------------------------------------------------------------------
    # Everything else → Next.js app
    # -------------------------------------------------------------------------
    location / {
        limit_req zone=global burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;

        # WebSocket support (Next.js HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -------------------------------------------------------------------------
    # Block common attack vectors
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|log|sh|sql|bak|git|yml|yaml|ini|conf)$ {
        deny all;
        return 404;
    }

    # -------------------------------------------------------------------------
    # Health check — no rate limiting, no logging
    # -------------------------------------------------------------------------
    location /api/health/live {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        access_log off;
    }
}
